// 从玩家原话里截取一个可复述的短句（去掉首尾标点，限长），用于"复述+回应"，避免答非所问
function echoUser(text) {
  if (!text) return '';
  let t = String(text).trim().replace(/^["'「『（(\s]+|["'」』）)\s]+$/g, '');
  // 取第一句（遇到句末标点截断）
  const seg = t.split(/[。！？!?\n.~…]/).filter(Boolean)[0] || t;
  let s = seg.trim();
  if (s.length > 18) s = s.slice(0, 18) + '…';
  return s;
}
// 粗略判断玩家这句话的"意图色彩"，让兜底更贴题
function intentOf(text) {
  const t = String(text || '');
  if (/[？?]|吗|呢|怎么|为什么|是不是|要不要|敢不敢/.test(t)) return 'question';
  if (/喜欢|爱|想你|心动|好看|帅|宝贝|亲|抱|吻|撩|喜欢你/.test(t)) return 'sweet';
  if (/讨厌|滚|走开|生气|哼|不理|烦|坏蛋/.test(t)) return 'tsundere';
  if (/命令|给我|过来|听话|不许|必须|乖/.test(t)) return 'order';
  return 'plain';
}

/* ---------- 埋点辅助（包一层保护：report.js 未加载也不报错、不阻断玩法） ---------- */

}
// 开新一局会话：刷新 contentId 与计时，使同一局的所有埋点用同一标识
function newSession() {

/* ---------- 底部交互区渲染辅助 ---------- */
function clearAction() { $('#actionArea').innerHTML = ''; }
/* 发消息期间临时锁住/解锁同屏的出招、选项等可点元素，避免「正在输入中…」时玩家点出招
   触发切屏，把当前输入框冲掉、导致发送流程错乱或输入框卡死。
   同时：玩家主动发消息时，把上方“想聊就聊…/直接出招”的提示文字与石头剪刀布选项整体隐藏，
   等 Ta 回复完再恢复，避免一边在聊天、一边还摆着出招选项造成的视觉割裂。 */
function setChoicesEnabled(enabled) {
  // 出招按钮：发送中直接隐藏（而非仅变暗），回复后恢复
  document.querySelectorAll('#actionArea .choice-row').forEach(r => {
    r.style.display = enabled ? '' : 'none';
  });
  // 单个出招按钮仍同步锁/解，双保险
  document.querySelectorAll('#actionArea .choice').forEach(c => {
    c.style.pointerEvents = enabled ? '' : 'none';
    c.style.opacity = enabled ? '' : '';
  });
  // 顶部提示文字：发送中隐藏，回复后恢复
  document.querySelectorAll('#actionArea .action-hint').forEach(h => {
    h.style.display = enabled ? '' : 'none';
  });
}
function setHint(html) {
  const h = document.createElement('div');
  h.className = 'action-hint';
  h.innerHTML = html;
  $('#actionArea').appendChild(h);
  return h;
}

/* ---------- 猜拳全屏结算 ---------- */
const HANDS = { rock: '✊', scissors: '✌️', paper: '✋' };
const HAND_CN = { rock: '石头', scissors: '剪刀', paper: '布' };
function judge(you, ai) {
  if (you === ai) return 'draw';
  const win = { rock: 'scissors', scissors: 'paper', paper: 'rock' };
  return win[you] === ai ? 'youWin' : 'aiWin';
}

/* 按设定胜率挑一个本局结果：玩家赢 60% / 玩家输 30% / 平局 10% */
function pickRPSOutcome() {
  const r = Math.random();
  if (r < 0.60) return 'youWin';
  if (r < 0.90) return 'aiWin';
  return 'draw';
}
/* 已知玩家出拳与目标结果，反推席恩该出的拳，使结算正好命中设定胜率 */
function aiHandFor(youHand, outcome) {
  const beats    = { rock: 'scissors', scissors: 'paper', paper: 'rock' }; // youHand 能赢的对象
  const beatenBy = { rock: 'paper', scissors: 'rock', paper: 'scissors' }; // 能赢 youHand 的拳
  if (outcome === 'draw')  return youHand;            // 平局：出一样的
  if (outcome === 'youWin') return beats[youHand];    // 玩家赢：席恩出会被玩家克制的那只
  return beatenBy[youHand];                           // 玩家输：席恩出克制玩家的那只
}

async function playRPS(youHand) {
  reportClick('play_clk'); // 埋点：用户出拳（每回合一次）
  // 胜率调控：60% 玩家赢 / 30% 玩家输 / 10% 平局（先定结果，再反推席恩出拳）
  const aiHand = aiHandFor(youHand, pickRPSOutcome());
  const result = judge(youHand, aiHand);
  // 把本轮猜拳数据记入 currentRound，供 buildSummaryText 按轮生成结构化骨架
  state.currentRound.handUser = youHand;
  state.currentRound.handSion = aiHand;
  state.currentRound.outcome  = result === 'draw' ? 'draw' : (result === 'youWin' ? 'user_win' : 'sion_win');
  const youEl = $('#rpsYou'), aiEl = $('#rpsAi'), resEl = $('#rpsResult'), subEl = $('.rps-sub');

  // —— 进场：先清空上一局的状态，进入「读招」过程 ——
  youEl.textContent = HANDS[youHand];        // 玩家这边直接定下（玩家已经选了）
  youEl.classList.remove('winner');
  aiEl.classList.remove('winner');
  resEl.textContent = '';
  resEl.classList.remove('show');
  if (subEl) subEl.textContent = '席恩正在出招…';
  showScreen('screen-rps');

  // —— 过场动画：席恩这边石头剪刀布快速轮换（节奏更快，避免拖沓） ——
  const seq = ['rock', 'scissors', 'paper'];
  aiEl.classList.add('rolling');
  await new Promise(done => {
    let i = 0, ticks = 0;
    const total = 5;                  // 轮换次数（再缩短，干脆利落）
    const timer = setInterval(() => {
      aiEl.textContent = HANDS[seq[i % 3]];
      i++; ticks++;
      if (ticks >= total) {
        clearInterval(timer);
        aiEl.textContent = HANDS[aiHand];   // 定格成真正的出招
        aiEl.classList.remove('rolling');
        aiEl.classList.add('lock');          // 定格弹一下
        setTimeout(() => aiEl.classList.remove('lock'), 260);
        done();
      }
    }, 55);
  });

  await sleep(80);                    // 定格后极短停顿，立刻揭晓

  // —— 揭晓结果 + 高亮赢家 ——
  const label = result === 'draw' ? '平局' : result === 'youWin' ? '你赢了！' : '你输了';
  resEl.textContent = label;
  resEl.classList.add('show');
  if (subEl) subEl.textContent = '本轮胜负';
  youEl.classList.toggle('winner', result === 'youWin');
  aiEl.classList.toggle('winner', result === 'aiWin');

  return new Promise(resolve => {
    let done = false;
    const finish = () => {
      if (done) return; done = true;
      clearTimeout(auto);
      $('#screen-rps').removeEventListener('click', handler);
      showScreen('screen-game');
      resolve({ result, youHand, aiHand });
    };
    const handler = () => finish();
    // 揭晓后很快就允许点击继续；若玩家不点，900ms 后自动推进，避免干等
    setTimeout(() => $('#screen-rps').addEventListener('click', handler), 180);
    const auto = setTimeout(finish, 900);
  });
}

/* ---------- 开场：席恩先开口，再进入第一轮 ---------- */
async function startOpening() {

  await showReaction(res.narration, res.line, false, true); // raw=true：保留开场白的古风原文

/* 渲染石头剪刀布出拳选项 */
function renderHandChoices() {
  const old = $('#actionArea .choice-row'); if (old) old.remove();

/* ---------- 猜拳结果分支 ---------- */
/* 猜拳结算的过渡台词：直接使用本地 SCRIPT 离线剧本（纯离线，无在线 AI）。
   这类台词只是承接氛围、不改数值。
   kind: 'aiWin'(席恩赢/玩家输) | 'aiLose'(玩家赢/席恩输) | 'draw'(平局) */
async function genTransition(kind) {
  const fb = {
    aiWin: SCRIPT.aiWin, aiLose: SCRIPT.aiLose, draw: SCRIPT.draw,
  }[kind];
  // fb 现在是「旁白+台词」成对的数组，整对随机取用，保证二者一一对应
  const pair = rand(fb);
  return { narration: pair.narration, line: pair.line };
}

async function handleRPSResult(result) {
  if (result === 'draw') {
    // 平局：先播台词，轻点后这一局照样计入一轮——直接推进到下一回合（或终局）
    clearAction();
    $('#dialog-area').classList.remove('is-hidden');
    $('#narration').textContent = '';
    $('#bubbleText').textContent = '正在输入中 …';
    const t = await genTransition('draw');
    await showReaction(t.narration, t.line, false);
    await waitForTap();
    if (state.round >= TOTAL_ROUNDS) {
      // 最后一轮平局：已用满回合，直接进入终局
      goEnding();
    } else {
      // 平局也消耗一轮：推进回合并重新出招
      archiveRound(); // 把本轮累积的结构化事件归档到 roundRecap（仅用于回传摘要，屏上回忆录不依赖它）
      state.round++;
      state.chatHistory = [];
      state.chatCount = 0;
      resetPortrait();
      renderRoundProgress();
      startRound();
    }
    return;
  }
  if (result === 'aiWin') {
    // 雇主输 → 席恩赢，切到“赢”的立绘；先播台词，轻点后再出真心话/大冒险
    setPortrait('win');
    clearAction();
    $('#dialog-area').classList.remove('is-hidden');
    $('#narration').textContent = '';
    $('#bubbleText').textContent = '正在输入中 …';
    const t = await genTransition('aiWin');
    await showReaction(t.narration, t.line, false);
    await waitForTap();
    renderTruthOrDare();
  } else {
    // 雇主赢 → 先播台词，轻点后再出惩罚菜单
    clearAction();
    $('#dialog-area').classList.remove('is-hidden');
    $('#narration').textContent = '';
    $('#bubbleText').textContent = '正在输入中 …';
    const t = await genTransition('aiLose');
    await showReaction(t.narration, t.line, false);
    await waitForTap();
    renderPunishMenu();
  }
}

/* ===== 前情提要：把「回忆录」(state.log) 压成精简文本，喂给 AI ===== */
// 让每次的对话/反应都基于这一晚已经发生过的情节来延展，避免重复说过的话、出过的桥段。
// 与回传给 bot 的 buildSummaryText 不同：这个是给本玩法内的 AI 当上下文用的「这一晚到目前为止发生了什么」。
function buildStoryRecap(maxItems = 16) {
  const log = Array.isArray(state.log) ? state.log : [];
  if (!log.length) return '';
  const recent = log.slice(-maxItems); // 只取最近若干条，控制 prompt 体积
  const lines = recent.map(it => {
    if (!it || !it.text) return '';
    const txt = String(it.text).trim();
    if (it.type === 'narr') return `（场景）${txt}`;
    if (it.type === 'line') return `席恩说：${txt}`;
    if (it.type === 'user') return `大小姐：${txt}`;
    return txt;
  }).filter(Boolean);
  return lines.join('\n');
}

/* ===== 真心话/大冒险题目：从本地题库随机抽取 + 防重复（纯离线） ===== */
// 记录最近出过的题（真心话+大冒险共用一个滚动队列），用于去重，避免每次出现一样或类似的题。
if (!Array.isArray(state.recentQ)) state.recentQ = [];

/* 取题目的文本键：真心话题是纯字符串；大冒险题是 { q, comply, refuse } 对象。
   去重（used / recentQ）统一按这段文本比对，两类题库通用。 */
function qKey(item) { return (item && typeof item === 'object') ? (item.q || '') : (item || ''); }

/* 从题库里随机抽一条：
   ① 严格排除「本局已出过的」（used）——确保一局内真心话/大冒险绝不重复；
   ② 其次排除最近滚动窗口（recentQ）里的，尽量连跨局也不撞车；
   ③ 极端兜底：整池都出过了才允许重复。 */
function pickAvoidingRecent(pool, used = []) {
  if (!pool || !pool.length) return null;
  let arr = pool.filter(it => !used.includes(qKey(it)) && !state.recentQ.includes(qKey(it)));
  if (!arr.length) arr = pool.filter(it => !used.includes(qKey(it))); // 放宽：只保证本局不重复
  if (!arr.length) arr = pool;                                        // 兜底：本局把整池都出过了
  return rand(arr);
}

/* 记录一道刚出的题，维护最近 12 条的滚动窗口 */
function rememberTDQuestion(q) {
  if (!q) return;
  state.recentQ.push(q);
  if (state.recentQ.length > 12) state.recentQ = state.recentQ.slice(-12);
}

const TRUTH_OPT_ICONS  = ['💗', '🌙'];
const TRUTH_OPT_DELTAS = [
  { heart: 16, sanity: -9, control: -6 },
  { heart: 12, sanity: -6, control: 0 }
];

/* 席恩出题，雇主从预制选项中作答（纯离线，无自由输入框） */
async function askTruthOrDare(kind) {
  // 数值影响：当理智被撩低 / 心跳极高时，气氛升温，题目更亲密一些
  const mood = moodOf(state.stats);
  const heated = (mood === 'unleashed' || mood === 'smitten');
  clearAction(); // 清掉真心话/大冒险卡片，避免与下方选项叠在一起

  // 纯离线：从本地题库随机抽一道，尽量避开最近出过的，减少重复
  const pool = kind === 'truth' ? SCRIPT.truthQ : SCRIPT.dareQ; // 真心话/大冒险均不再区分常规/进阶，各自合并为一个题库
  // 本局已出过的同类题（真心话 / 大冒险各自一份），确保一局内不触发一样的
  const used = kind === 'truth' ? state.usedTruth : state.usedDare;
  const item = pickAvoidingRecent(pool, used); // 真心话→字符串；大冒险→{ q, comply, refuse }
  const q = qKey(item);  // 题目文本（去重、展示、埋点都用它）
  used.push(q);          // 记入本局已用，锁死一局内不重复
  rememberTDQuestion(q); // 记入"最近出过的题"，供跨局去重
  // 记录到 currentRound：题目类型 + 题目摘要（>14 字则截断 + …，避免撑爆摘要）
  state.currentRound.type = kind === 'truth' ? 'truth' : 'dare';
  state.currentRound.question = String(q).length > 14 ? String(q).slice(0, 13) + '…' : String(q);

  clearAction(); // 清掉"席恩正在斟酌他的题目…"提示，避免它残留在底部把后续内容挡住

  // 大冒险：切到大冒险专属立绘（真心话保持当前态）
  if (kind === 'dare') setPortrait('dare');

  // 先播席恩出题的台词（不挡脸），玩家轻点后再进入作答
  await showReaction(kind === 'truth' ? '席恩眼底含笑，俯身凑近，缓缓抛出了他的问题。' : '席恩勾起唇角，压低嗓音，给出了他那道暧昧的“大冒险”指令。', q, false);
  await waitForTap();
  const heatTag = heated ? ` <span class="deco" style="color:var(--wine-light)">· 气氛升温</span>` : '';
  setHint(kind === 'truth' ? `<span class="deco">✦</span> 真心话 · 选一种回应${heatTag} <span class="deco">✦</span>` : `<span class="deco">✦</span> 大冒险 · 选一种行动${heatTag} <span class="deco">✦</span>`);

  // 选定某个预制回应：把动作记成旁白，再用该选项自带的反应推进
  const answer = async (opt) => {
    clearAction(); // 作答即清掉选项行，确保进入「正在输入中」时屏幕干净、无重叠
    state.log.push({ type: 'narr', text: opt.label });
    // 记录玩家本轮选项名（供摘要按轮生成结构化骨架）
    state.currentRound.answer = opt.name;
    const ctx = `大小姐猜拳输了，选择了「${kind === 'truth' ? '真心话' : '大冒险'}」。席恩的题目是：「${q}」。大小姐的回应是：「${opt.name}」。`;
    // 大冒险：优先播放「本题专属」的照做 / 拒绝反应（来自题库）；缺失时回退通用文案
    let reactFn = () => ({ narration: rand(opt.narration), line: rand(opt.line), delta: tuneDelta(opt.delta) });
    if (kind === 'dare' && item && typeof item === 'object' && opt.resp) {
      const r = opt.resp === 'comply' ? item.comply : item.refuse;
      if (r && (r.narration || r.line)) {
        // 「大脑空白」失守版（台词以 ■■■ 开头）：理智骤降，切到理智崩坏立绘，与惩罚逻辑一致
        const blank = typeof r.line === 'string' && r.line.indexOf('■■■') === 0;
        if (blank) setPortrait('sanityLow');
        const delta = blank ? tuneDelta({ heart: 22, sanity: -20, control: -14 }) : tuneDelta(opt.delta);
        reactFn = () => ({ narration: r.narration, line: r.line, delta });
      }
    }
    await reactAndContinue(ctx, reactFn, null, true);
  };

  // 渲染预制选项（真心话：每题自带 2 个专属选项 / 大冒险：照做·求饶 2 个），不再有任何输入框
  let options;
  if (kind === 'truth') {
    // 真心话：优先用本题自带的两个选项（name + 专属旁白/台词）；老结构或缺失时回退通用四选项
    if (item && typeof item === 'object' && Array.isArray(item.opts)) {
      options = item.opts.map((o, i) => ({
        ico: TRUTH_OPT_ICONS[i % TRUTH_OPT_ICONS.length],
        name: o.name,
        label: `大小姐略一沉吟，选择了「${o.name}」。`,
        narration: [o.narration],
        line: [o.line],
        delta: TRUTH_OPT_DELTAS[i % TRUTH_OPT_DELTAS.length]
      }));
    } else {
      options = TD_CHOICES.truth;
    }
  } else {
    options = TD_CHOICES.dare;
  }
  const row = document.createElement('div');
  row.className = 'choice-row';
  options.forEach((opt, i) => {
    const c = document.createElement('div');
    c.className = 'choice';
    c.innerHTML = `<div class="ico">${opt.ico}</div><div class="cname">${opt.name}</div>`;
    c.onclick = () => answer(opt);
    row.appendChild(c);
  });
  $('#actionArea').appendChild(row);
}

/* 根据当前情绪基调，微调离线 delta，让数值彼此联动、更合理 */
function tuneDelta(base) {
  const mood = moodOf(state.stats);
  const d = { ...base };
  if (mood === 'unleashed') { // 已克制崩坏：更心动、主动权更偏向大小姐
    d.heart = (d.heart || 0) + 4; d.control = (d.control || 0) - 4;
  } else if (mood === 'smitten') { // 已彻底心动：理智更易失守
    d.sanity = (d.sanity || 0) - 4;
  } else if (mood === 'dominant') { // 强势掌控：心动幅度收敛
    d.heart = Math.max(0, (d.heart || 0) - 3);
  }
  return d;
}

/* 从惩罚池里随机抽 n 个不重复 */
function pickRandom(arr, n) {
  const pool = arr.slice();
  const out = [];
  while (out.length < n && pool.length) {
    out.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  return out;
}

async function doPunish(p) {
  clearAction();
  // 记入本局已用惩罚，锁死一局内不重复触发同一个惩罚
  if (!state.usedPunish.includes(p.name)) state.usedPunish.push(p.name);
  // 若该惩罚有专属立绘（喝酒/蒙眼/泼水），切换过去
  const scene = punishScene(p.name);
  if (scene) setPortrait(scene);
  // 把玩家选择的惩罚记入回忆录
  state.log.push({ type: 'user', text: `惩罚 Ta：${p.name}` });
  // 记录到 currentRound：玩家本轮对席恩的惩罚（标记 type 为 punish，供摘要区分）
  state.currentRound.punish = p.name;
  state.currentRound.type = 'punish';
  const ctx = `大小姐猜拳赢了，对席恩使用了惩罚「${p.name}」（${p.ctx}）。请席恩对这个惩罚作出反应，语气暧昧、撩拨、有性张力（称呼她"主人"或"大小姐"）。`;
  const fb = () => {
    const r = SCRIPT.punishReact[p.name];
    // 整对随机抽取「旁白+台词」，保证两者是同一 ver、语境一致；兼容旧的 narration/line 数组结构
    let narration, line;
    if (r && Array.isArray(r.versions) && r.versions.length) {
      const v = rand(r.versions);
      narration = v.narration; line = v.line;
    } else if (r) {
      narration = rand(r.narration); line = rand(r.line);
    }
    // 特殊「大脑空白」失守版：理智骤降，切到理智崩坏立绘
    const isBlank = typeof line === 'string' && line.indexOf('■■■') === 0;
    if (isBlank) setPortrait('sanityLow');
    const delta = isBlank
      ? tuneDelta({ heart: 22, sanity: -20, control: -14 })
      : tuneDelta({ heart: 14, sanity: -8, control: -10 });
    return { narration, line, delta };
  };
  await reactAndContinue(ctx, fb, null, true);
}

/* ---------- 通用：用离线剧本作出反应，更新数值，进入对话 ----------
   reactFn 返回 { narration, line, delta }，全部来自本地 SCRIPT 剧本库。 */
async function reactAndContinue(context, reactFn, userText, skipUserLog) {
  if (userText && !skipUserLog) {
    state.log.push({ type: 'user', text: userText });
    // 记录玩家本轮自由对话原话（去 HTML，最多 18 字；超长截断 + …）
    const clean = String(userText).replace(/<[^>]*>/g, '').trim();
    state.currentRound.userText = clean.length > 18 ? clean.slice(0, 17) + '…' : clean;
  }
  // “正在输入中…”占位（席恩要说话了，先把对话框显示出来）
  $('#dialog-area').classList.remove('is-hidden');
  $('#bubble').classList.remove('empty');
  $('#narration').textContent = '';
  $('#bubbleText').textContent = '正在输入中 …';

  // 纯离线：直接使用本地剧本反应（不接入在线 AI）
  const res = reactFn();
  // —— 先只播对话（旁白+台词），此时底部不出任何选择按钮，立绘不被遮挡 ——
  clearAction();
  await showReaction(res.narration, res.line, false);
  // 台词刚落，数值随即升降（此刻玩家正盯着对话，时机最贴）
  applyDelta(res.delta || { heart: 0, sanity: 0, control: 0 });
  const storyPlayed = await flushPendingEvent(); // 若数值跨过阈值，插播一段剧情转折
  // —— 玩家轻点一下，才进入选择阶段（对话与选择分页，避免挡脸） ——
  // 若刚插播了剧情：看完剧情立绘那一下轻点即直接进入新一轮，不再多等一次点击。
  if (!storyPlayed) await waitForTap();
  renderChatPhase();
}

/* ---------- 展示“领取奖励”终局按钮（独占底部，不与输入框/出拳/提示共存，避免重合） ---------- */
function showGiftButton() {
  if ($('#nextBtn')) return; // 已经出现过就不重复添加
  // 彻底清空底部交互区：移除输入框、出拳行、以及所有旧提示，确保领取按钮独占底部，杜绝重叠
  clearAction();
  // 关键修复：领取按钮独占底部时，必须收起绝对定位的对话框（旁白+气泡），否则二者钉在同一底部基线会重叠
  $('#dialog-area').classList.add('is-hidden');
  // 解除可能残留的发送锁/隐藏态，避免 setChoicesEnabled 之类后续逻辑再把元素显隐打乱
  window.__sending = false;
  const wrap = document.createElement('div');
  wrap.className = 'center-action';
  wrap.innerHTML = `<div class="action-hint"><span class="deco">✦</span> 这一晚到此为止了 <span class="deco">✦</span></div><button class="gift-claim" id="nextBtn"><span class="gift-ico">🎁</span>领取今夜专属卡片</button>`;
  $('#actionArea').appendChild(wrap);
  $('#nextBtn').onclick = () => goEnding();
}

/* ---------- 每轮结束：纯离线无自由对话，直接进入下一轮 / 领取结局 ---------- */
function renderChatPhase() {
  // 埋点：进入回合衔接节点（带摘要回传，让 bot 知情当前进展）
  reportClick('enter_chat_clk', { content: (typeof safeSummary === 'function') ? safeSummary() : '' });
  renderChatActions(); // 渲染底部交互区（出招选项 / 领取结局）
}

/* 渲染回合结束后的底部交互区（无任何输入框）：
   - 非最后一轮：直接摆出下一轮的石头剪刀布，点击即进入下一回合；
   - 最后一轮：直接摆出「领取奖励」独占底部。 */
function renderChatActions() {
  clearAction();
  const isLast = state.round >= TOTAL_ROUNDS;
  if (isLast) {
    // 最后一轮：直接领取结局
    showGiftButton();
    return;
  }
  // 非最后一轮：展示下一轮的石头剪刀布，点击即出拳进入下一回合
  setHint(`<span class="deco">✦</span> 这一回合结束了，出招开启第 ${state.round + 1}/${TOTAL_ROUNDS} 回合 <span class="deco">✦</span>`);
  const row = document.createElement('div');
  row.className = 'choice-row';
  ['rock', 'scissors', 'paper'].forEach(h => {
    const c = document.createElement('div');
    c.className = 'choice';
    c.innerHTML = `<div class="ico">${HANDS[h]}</div><div class="cname">${HAND_CN[h]}</div>`;
    c.onclick = async () => {
      archiveRound(); // 把本轮累积的结构化事件归档到 roundRecap（仅用于回传摘要，屏上回忆录不依赖它）
      state.round++;
      state.chatHistory = [];
      state.chatCount = 0;
      resetPortrait(); // 进入下一回合，立绘回到默认
      renderRoundProgress();
      const { result } = await playRPS(h);
      handleRPSResult(result);
    };
    row.appendChild(c);
  });
  $('#actionArea').appendChild(row);
}

/* ---------- 通用文本输入框 ---------- */
function renderFreeInput(placeholder, onSend, keep) {
  // 移除旧输入框
  const old = $('#actionArea .input-wrap'); if (old) old.remove();
  const wrap = document.createElement('div');
  wrap.className = 'input-wrap';
  wrap.innerHTML = `<textarea rows="1" placeholder="${placeholder}"></textarea><button class="send-btn">➤</button>`;
  $('#actionArea').appendChild(wrap);
  const ta = wrap.querySelector('textarea');
  const btn = wrap.querySelector('.send-btn');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 90) + 'px';
    if (!wrap._sending && !window.__sending) btn.disabled = !ta.value.trim();
  });
  btn.disabled = true;
  // 把「发送中」锁挂到全局，方便出招按钮等其它入口在发消息期间禁用，避免两条异步流程打架。
  const send = async () => {
    if (window.__sending) return;            // 防重复提交 / 防与其它发送并发
    const text = ta.value.trim(); if (!text) return;
    window.__sending = true;
    wrap._sending = true;
    ta.value = ''; ta.style.height = 'auto'; btn.disabled = true; ta.disabled = true;
    wrap.classList.add('is-sending'); // 视觉反馈：转圈 + 微暗，明确「正在发送」
    // 发送期间，把同屏的出招/选项按钮一并锁住，避免玩家在「正在输入中…」时点出招导致切屏、
    // 把当前输入框冲掉，从而让 finally 找不到 wrap、永久卡死。
    setChoicesEnabled(false);
    if (!keep) { wrap.remove(); }
    else { try { ta.blur(); } catch (_) {} }
    try {
      await onSend(text);
    } catch (err) {
      // 兜底：即便对话流程异常，也不能让输入框永久卡死
      console.error('[chat send] failed:', err);
    } finally {
      // 关键修复：恢复逻辑【无条件执行】，不再用 document.body.contains(wrap) 当门槛。
      // 只要还是 keep 模式且输入框 DOM 仍在，就一定把它恢复成可用态；
      // 即便 wrap 已被新流程替换，也至少把全局发送锁解开，绝不留死锁。
      window.__sending = false;
      wrap._sending = false;
      wrap.classList.remove('is-sending');
      setChoicesEnabled(true);
      if (keep) {
        // 优先恢复「当前实际存在的输入框」：流程中若重渲染过，wrap 可能已是新的那个
        const liveWrap = $('#actionArea .input-wrap');
        const liveTa = liveWrap && liveWrap.querySelector('textarea');
        const liveBtn = liveWrap && liveWrap.querySelector('.send-btn');
        if (liveWrap) { liveWrap._sending = false; liveWrap.classList.remove('is-sending'); }
        if (liveTa) { liveTa.disabled = false; }
        if (liveBtn && liveTa) liveBtn.disabled = !liveTa.value.trim();
      }
    }
  };
  btn.onclick = send;
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
}

/* ============================================================
   结尾：根据本局数值，用本地剧本为这局定制专属卡片（称号+点评+心声），纯离线
   ============================================================ */
async function goEnding() {
  state.ended = true;
  // 纯离线：直接用本地规则生成结局卡片（不接入在线 AI）
  const card = offlineEndingCard(state.stats);

  // 关键修复：点「领取」后先清掉领取按钮，让对话框独占底部，杜绝二者重叠（之前会盖在对话框上）
  clearAction();
  // 先把席恩递卡的收尾对话完整播完，玩家读完轻点继续后，再直接出卡牌（不再有"正在定制"中间态）
  await showReaction('席恩俯身将一张卡片递到你唇边，指尖却罕见地有一丝停顿，仿佛上面写着他不愿轻易示人的心事。', '游戏结束了呢，大小姐。这是今晚……专属于你一个人的纪念。请收好哦，里面有一句话，是我藏了很久、终于忍不住说出口的真心。', true);
  // 轻点继续后对话框已退场，收起残留并直接进入卡牌页
  clearAction();
  $('#dialog-area').classList.add('is-hidden');

  // 记录结局信息到 state，供埋点摘要 buildSummaryText 使用
  state.endingTitle = card.title;
  state.endingDesc = card.desc || '';
  // 埋点：领取奖励（完整玩完），带摘要回传给 bot —— 退出时还会再带一次 exp 摘要，二者互为兜底
  reportClick('finish_clk', { content: (typeof safeSummary === 'function') ? safeSummary() : '' });

  // 渲染定制卡片（含一张贴合本局结局的触发图 + 称号点评 + 心声 + 收尾剧情）
  applyCustomCard(card);
  $('#achVoice').textContent = '……';
  showScreen('screen-ending');
  // 星空延后到下一帧再启动：让结局页先平滑绘制出来，避免切屏瞬间
  // canvas 初始化与页面重排挤在同一帧造成"卡一下"。
  requestAnimationFrame(() => initStars($('#stars')));

  // 触发图淡入（下一帧加 show，触发 CSS 过渡）
  requestAnimationFrame(() => $('#achCg').classList.add('show'));

  // 心声打字呈现（背面到此为止：只留这句藏了很久的真心，不再有后续结局）
  await typeText($('#achVoice'), card.voice, 45);
}

/* 根据本局最终数值，挑一张最贴合结局氛围的触发图（复用阈值专属立绘） */
function pickEndingCG(stats) {
  const { heart, sanity, control } = stats;
  let scene;
  if (heart >= 140) scene = 'heartHigh';
  else if (sanity <= 55) scene = 'sanityLow';
  else if (control >= 150) scene = 'controlHigh';
  else if (control <= 60) scene = 'controlLow';
  else if (heart >= 120) scene = 'heartHigh';
  else scene = 'win'; // 不偏不倚时，用“席恩赢”的暧昧定格收尾
  const list = (PORTRAITS[scene] && PORTRAITS[scene].length) ? PORTRAITS[scene] : PORTRAITS.default;
  return 'assets/' + rand(list);
}

/* 把 AI 定制的卡片信息渲染到结局卡片上（含触发图） */
function applyCustomCard(card) {
  const cg = $('#achCg');
  if (cg) {
    cg.classList.remove('show');
    const url = card.cg || pickEndingCG(state.stats);
    // 预加载，成功才设背景，失败则回退默认立绘，绝不出现裂图
    const img = new Image();
    img.onload = () => { cg.style.backgroundImage = `url('${url}')`; };
    img.onerror = () => { cg.style.backgroundImage = `url('assets/xien.png')`; };
    img.src = url;
  }
  // 稀有度 & 星级：按三维偏离强度评定（越极端越稀有）
  const s = state.stats;
  const intensity = Math.max(s.heart - 100, 0) + Math.max(100 - s.sanity, 0) + Math.abs(s.control - 100);
  let rarity, stars;
  if (intensity >= 110) { rarity = 'SSR'; stars = 7; }
  else if (intensity >= 55) { rarity = 'SR'; stars = 6; }
  else { rarity = 'R'; stars = 5; }
  const rEl = $('#achRarity');
  if (rEl) { rEl.textContent = rarity; rEl.className = 'cf-rarity r-' + rarity.toLowerCase(); }
  const stEl = $('#achStars');
  if (stEl) { stEl.textContent = '★'.repeat(stars); }
  // 典藏编号：按本局数值生成一个稳定的三位编号，强化「专属典藏」收藏感
  const edEl = $('#achEdition');
  if (edEl) {
    const s = state.stats || {};
    const no = (((s.heart || 0) * 7 + (s.sanity || 0) * 3 + (s.control || 0) * 5) % 200) + 1;
    edEl.textContent = '典藏 · No.' + String(no).padStart(3, '0');
  }
  // 正面标题只放卡名（角色名已单独显示在标题上方）；背面保留「席恩 · 卡名」
  $('#achTitle').textContent = card.title;
  $('#achTitleBack').textContent = '席恩 · ' + card.title;
  // 一句结局描述（位于背面标题分隔线下方）
  $('#achDesc').textContent = card.desc || '';
  // 三项数值各成一张独立药丸卡片，视觉更清晰精致
  $('#achStats').innerHTML = `
    <div class="ach-stat"><div class="as-ico">💗</div><div class="as-val">${state.stats.heart}</div><div class="as-lbl">心跳</div></div>
    <div class="ach-stat"><div class="as-ico">💡</div><div class="as-val">${state.stats.sanity}</div><div class="as-lbl">理智</div></div>
    <div class="ach-stat"><div class="as-ico">♟️</div><div class="as-val">${state.stats.control}</div><div class="as-lbl">掌控欲</div></div>`;
  setCardFace(0); // 进入结局：卡片回到正面（第 0 面）
}

/* 切换卡片正/背面：0=正面立绘，1=背面文案。同步轨道平移与圆点高亮 */
function setCardFace(idx) {
  const flip = $('#cardFlip');
  if (!flip) return;
  flip.classList.toggle('flipped', idx === 1);
  const dots = flip.parentNode.querySelectorAll('.cs-dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  const tip = $('#cardFlipTip');
  if (tip) tip.textContent = idx === 1 ? '轻点卡片 · 翻回正面' : '轻点卡片 · 查看背面';
}

/* 收藏卡：轻触整张卡片即在正/背面之间 3D 翻面（点击切换，无需滑动） */
function setupCardSwipe() {
  const flip = $('#cardFlip');
  const vp = flip && flip.querySelector('.cs-viewport');
  if (!vp) return;
  vp.style.cursor = 'pointer';
  // 轻触/点击：在两面间切换（正面 0 ↔ 背面 1）
  vp.addEventListener('click', () => {
    setCardFace(flip.classList.contains('flipped') ? 0 : 1);
  });
}

/* AI 不可用时的本地兜底定制卡片：仍按本局数值动态生成，避免千篇一律 */
function offlineEndingCard(stats) {
  const { heart, sanity, control } = stats;
  let card;
  if (heart >= 140) card = { title: '心跳失控', emblem: '💗', desc: '你让这位向来从容的执事，心跳险些失了节制' };
  else if (sanity <= 55) card = { title: '清醒尽失', emblem: '🥀', desc: '你一点点撩碎了他引以为傲的那套克制' };
  else if (control >= 150) card = { title: '甘愿沦陷', emblem: '🕸️', desc: '你心甘情愿落进了他温柔又灼热的掌控里' };
  else if (control <= 60) card = { title: '反客为主', emblem: '👑', desc: '你反手把这个危险的执事，撩得乱了分寸' };
  else if (heart >= 120 && sanity <= 80) card = { title: '禁忌私语', emblem: '🗝️', desc: '你撬开了他藏得最深的那道心防' };
  else card = { title: '今夜同谋', emblem: '🌙', desc: '你与他共度了一个旖旎而意味深长的夜晚' };
  card.voice = offlineEndingVoice(stats);
  card.epilogue = offlineEndingEpilogue(stats);
  return card;
}

/* AI 不可用时的本地兜底收尾剧情：呼应本局走向，给结局一段画面感的余韵 */
function offlineEndingEpilogue(stats) {
  const { heart, sanity, control } = stats;
  if (heart >= 140) return '酒吧的灯光不知何时暗了一格。他把那张卡片轻轻按进你掌心，指尖却久久没有松开——仿佛松开的那一刻，今晚就真的结束了。「下次再来，」他低声说，尾音里藏着连他自己都未必察觉的不舍。';
  if (sanity <= 55) return '你站起身时脚步有些虚浮。他自然地扶住你的手肘，那只手稳得过分，呼吸却比平时重了几分。「我送你。」不是询问，是宣告。门外的夜色很深，而他始终走在你身侧，半步不离。';
  if (control >= 150) return '他替你拢了拢肩上的外套，动作熟练得像做过千百遍。「乖乖回去，别让我担心。」尾音压得极低，却带着不容拒绝的笃定。你回头时，他正倚着吧台看你，目光像一张早已收紧的网。';
  if (control <= 60) return '难得地，是他先移开了视线。耳尖那一点红在暖光里格外明显。「……今晚算你赢。」他低笑着认输，可那只悄悄扣住你指尖的手，分明半点也不打算放你走。';
  return '夜色把整间酒吧浸得温柔。他送你到门口，欲言又止了几次，最终只是替你拉开了门。「路上小心。」简简单单四个字，却让你在转身后，仍能感觉到那道目光一直落在背上，直到拐角。';
}

function offlineEndingVoice(stats) {
  const pool = [
    "……今晚就到这里吧。可你别急着走呀……请你别问我，为什么舍不得放你离开这间只剩我们两人的酒吧。",
    "我向来记性很好，唯独今晚你每一次脸红、每一次心跳，我都打算……永远刻在心里，谁也不许碰。",
    "赢也好输也罢，今夜能这样近地拥着你的人，始终是我。这一点，请你……一定要记牢。",
    "此刻坐在我身侧的你，让我生出了一个危险的念头……真想就这样，把你留在我身边，再不放手。"
  ];
  if (stats.heart >= 140) return "我的心跳，方才有那么几次，险些贴着你的，一同失了控。这种失态作为执事本不该……可若是为你，我甘之如饴。";
  if (stats.sanity <= 55) return "你总有办法，让我那套引以为傲的克制，一点点地……溃不成军。既然是你撩乱的，便请你负责。";
  if (stats.control >= 150) return "你乖乖落入我怀里的模样，比任何一局胜负都让我心动。下次……我想要的，可就不只是猜拳这么简单了。";
  return rand(pool);
}

/* ============================================================
   历史记录 & 启动
   ============================================================ */
function renderLog() {
  const list = $('#logList'); list.innerHTML = '';
  state.log.forEach(it => {
    const d = document.createElement('div');
    if (it.type === 'narr') { d.className = 'li-narr'; d.textContent = narrationToSecondPerson(it.text); }
    else if (it.type === 'line') {
      // 与对话框一致：去掉台词里的括号动作，称呼统一为「你」
      const { line } = stripParenActions(it.text);
      d.className = 'li-line'; d.innerHTML = `<b>席恩：</b>${toSecondPerson(line)}`;
    }

  });
}

function resetGame() {
  state.round = 1;
  state.stats = { heart: 100, sanity: 100, control: 100 };
  state.log = []; state.chatHistory = []; state.chatCount = 0;
  state.milestones = {}; state.pendingEvent = null;
  state.ended = false; state.endingTitle = ''; state.endingDesc = ''; // 清结局标记，避免摘要残留上一局
  state.usedTruth = []; state.usedDare = []; state.usedPunish = [];   // 新一局重置去重记录，真心话/大冒险/惩罚各自重新可选
  state.roundRecap = []; state.currentRound = { handUser:'', handSion:'', outcome:'', type:'', question:'', answer:'', punish:'', userText:'', threshold:'' }; // 新一局清空按轮结构化摘要（仅影响回传，不影响屏上回忆录）
  document.querySelectorAll('.stat .val').forEach((el, i) => el.textContent = 100);
  document.querySelectorAll('.stat .arrow').forEach(a => a.className = 'arrow');
  updateFxVignette(); // 数值归位，晕染随之清空（初始值未达阈值，浓度为 0）
  renderRoundProgress();
}

/* ---------- 自定义确认弹层（替代原生 confirm） ---------- */
function showConfirm(text, okLabel, cancelLabel) {
  return new Promise(resolve => {
    const ov = $('#confirmOverlay');
    $('#confirmText').textContent = text;
    $('#confirmOk').textContent = okLabel || '确定';
    $('#confirmCancel').textContent = cancelLabel || '取消';
    ov.classList.add('show');
    const cleanup = (val) => {
      ov.classList.remove('show');
      $('#confirmOk').onclick = null;
      $('#confirmCancel').onclick = null;
      ov.onclick = null;
      resolve(val);
    };
    $('#confirmOk').onclick = () => cleanup(true);
    $('#confirmCancel').onclick = () => cleanup(false);
    ov.onclick = e => { if (e.target === ov) cleanup(false); };
  });
}

/* ---------- 背景音乐（暧昧回声，循环 + 可静音） ----------
   浏览器禁止无交互自动播放，故首次任意点击/触摸后开始播放；
   右下角圆钮可随时静音/恢复。 */
function initBGM() {
  const el = $('#bgm'), btn = $('#bgmToggle');
  if (!el || !btn) return;
  el.volume = 0.42;
  let muted = false, started = false;
  const play = () => {
    if (muted) return;
    const p = el.play(); if (p && p.catch) p.catch(() => {});
    started = true; btn.classList.remove('hint');
  };
  // 首次用户交互即尝试播放（绕过自动播放限制）
  const kick = () => { if (!started && !muted) play(); };
  document.addEventListener('click', kick);
  document.addEventListener('touchstart', kick, { passive: true });
  // 静音开关（阻止冒泡，避免误触发游戏内的“轻点继续”）
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted;
    btn.classList.toggle('muted', muted);
    btn.classList.remove('hint');
    if (muted) { el.pause(); }
    else { const p = el.play(); if (p && p.catch) p.catch(() => {}); started = true; }
  });
}

/* ---------- 事件绑定 ---------- */
window.addEventListener('DOMContentLoaded', () => {
  initStars($('#stars'));
  initStars($('#stars2'));
  bindTypingSkip(); // 打字过程中点击可一键补全整句

  $('#btnStart').onclick = () => {
    resetGame();
    newSession();                  // 新一局：刷新 contentId 与计时
    reportClick('start_clk');      // 埋点：开始游戏
    showScreen('screen-game');
    startOpening();
  };
  $('#btnRestart').onclick = () => {
    reportClick('retry_clk');      // 埋点：再玩一局
    resetGame();
    newSession();                  // 再来一局也算新会话
    showScreen('screen-start');
  };
  // 收藏卡：轻触整张卡片翻面（正/背面切换）
  setupCardSwipe();
  initBGM(); // 背景音乐（首次交互后播放，可静音）
  $('#btnBack').onclick = async () => {
    const ok = await showConfirm('今夜的游戏还未尽兴，确定要离开吗？', '狠心离开', '再玩一会');
    if (ok) {
      // 埋点：中途返回（带摘要回传，让 bot 知道用户没玩完就离开了，及其已经历的情节）
      reportClick('back_clk', { content: (typeof safeSummary === 'function') ? safeSummary() : '' });
      resetGame(); showScreen('screen-start');
    }
  };
  $('#btnLog').onclick = () => { renderLog(); $('#logOverlay').classList.add('show'); };
  $('#btnCloseLog').onclick = () => $('#logOverlay').classList.remove('show');
  $('#logOverlay').onclick = e => { if (e.target.id === 'logOverlay') $('#logOverlay').classList.remove('show'); };
});

</script>
